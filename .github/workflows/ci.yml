name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    name: build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify formatting
        run: |
          out=$(gofmt -l $(find . -name '*.go'))
          if [ -n "$out" ]; then
            echo "These files are not gofmt-clean:"
            echo "$out"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -coverprofile=coverage.out ./...

      - name: Build
        run: go build ./...

      - name: Upload coverage profile
        uses: actions/upload-artifact@v4
        with:
          name: coverage.out
          path: coverage.out

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2

  coverage-badge:
    name: update coverage badge
    runs-on: ubuntu-latest
    needs: [build-test, lint]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download coverage profile
        uses: actions/download-artifact@v4
        with:
          name: coverage.out

      - name: Generate badge data
        run: |
          pct=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}' | tr -d '%')
          color=$(awk -v p="$pct" 'BEGIN {
            if (p >= 90) print "brightgreen";
            else if (p >= 80) print "green";
            else if (p >= 70) print "yellowgreen";
            else if (p >= 60) print "yellow";
            else if (p >= 50) print "orange";
            else print "red";
          }')
          mkdir -p .github/badges
          printf '{"schemaVersion":1,"label":"coverage","message":"%s%%","color":"%s"}\n' "$pct" "$color" > .github/badges/coverage.json

      - name: Commit badge if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/badges/coverage.json
          if git diff --cached --quiet; then
            echo "Coverage unchanged"
          else
            git commit -m "chore: update coverage badge [skip ci]"
            git push
          fi
