site_name: polymarket-mcp
site_description: An MCP server exposing polymarket headlines and search as tools an LLM client can call.
site_url: https://rangertaha.github.io/polymarket-mcp/
repo_url: https://github.com/rangertaha/polymarket-mcp
repo_name: rangertaha/polymarket-mcp
edit_uri: edit/main/docs/

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - tables
  - attr_list
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.details

plugins:
  - search

nav:
  - Home: index.md
  - Install: install.md
  - Configuration: configuration.md
